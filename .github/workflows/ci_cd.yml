name: MLOps CI/CD — Starbucks Incremental Training

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    # Runs every hour — each run trains on the next batch
    - cron: "0 * * * *"
  workflow_dispatch:

env:
  KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
  KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}

jobs:
  # ── Job 1: Tests ─────────────────────────────────────────────────────────
  test:
    name: Run ML system tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ── Job 2: Incremental training ───────────────────────────────────────────
  train:
    name: Incremental training (batch update)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore cached artifacts (model + pipeline state) from previous run
      - name: Restore artifacts cache
        uses: actions/cache@v4
        with:
          path: artifacts/
          key: artifacts-${{ github.run_number }}
          restore-keys: |
            artifacts-

      # Download dataset from Kaggle if not already in cache
      - name: Download dataset from Kaggle
        run: |
          mkdir -p artifacts/data
          if [ ! -f "artifacts/data/starbucks_customer_ordering_patterns.csv" ]; then
            echo "Dataset not cached — downloading from Kaggle..."
            python - <<'EOF'
          import kaggle, pathlib
          dest = pathlib.Path("artifacts/data")
          dest.mkdir(parents=True, exist_ok=True)
          kaggle.api.authenticate()
          kaggle.api.dataset_download_files(
              "likithagedipudi/starbucks-customer-ordering-patterns",
              path=str(dest),
              unzip=True,
          )
          print("Dataset downloaded.")
          EOF
          else
            echo "Dataset found in cache — skipping download."
          fi

      - name: Run pipeline update (train on next batch)
        run: python run.py -mode update

      - name: Generate summary report
        run: python run.py -mode summary

      # Save artifacts cache for the next CRON run
      - name: Save artifacts cache
        uses: actions/cache/save@v4
        with:
          path: artifacts/
          key: artifacts-${{ github.run_number }}

      - name: Upload training logs
        uses: actions/upload-artifact@v4
        with:
          name: training-logs-${{ github.run_number }}
          path: artifacts/logs/
          retention-days: 30

      - name: Upload production model
        uses: actions/upload-artifact@v4
        with:
          name: production-model-${{ github.run_number }}
          path: artifacts/models/production/
          retention-days: 30

      - name: Upload summary report
        uses: actions/upload-artifact@v4
        with:
          name: summary-report-${{ github.run_number }}
          path: artifacts/reports/
          retention-days: 30
